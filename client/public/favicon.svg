<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1226"/>
      <stop offset="100%" stop-color="#1a2240"/>
    </linearGradient>
    <linearGradient id="m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="55%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#b8721c"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#g)"/>
  <!-- Stylised desk + horizon: a flat top with a vertical column on the left,
       suggesting both a "D" and a writing desk with a single column. -->
  <g stroke="url(#m)" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- The desk top (horizon). -->
    <line x1="14" y1="22" x2="50" y2="22"/>
    <!-- The left column / "D" upright. -->
    <line x1="18" y1="22" x2="18" y2="46"/>
    <!-- The right curve of the D / writing surface. -->
    <path d="M22 26 Q 48 26 48 36 Q 48 46 22 46"/>
  </g>
  <!-- Amber dot — the live indicator. -->
  <circle cx="50" cy="22" r="2.4" fill="#f5a623"/>
</svg>

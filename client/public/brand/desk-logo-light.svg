<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="240" height="280">
  <!-- D-Sunrise Logomark | The Desk -->
  <g fill="none" stroke="#0C1220" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- D frame (thick strokes) -->
    <g stroke-width="5.0">
      <!-- Vertical stem (ascender + bowl height) -->
      <line x1="56" y1="16" x2="56" y2="264"/>
      <!-- Top horizontal -->
      <line x1="56" y1="100" x2="92" y2="100"/>
      <!-- Bottom horizontal -->
      <line x1="56" y1="264" x2="92" y2="264"/>
      <!-- Bowl arc (semicircle right) -->
      <path d="M 92 100 A 82.0 82.0 0 0 1 92 264"/>
    </g>
    
    <!-- Sun dome (FILLED semicircle) -->
    <path d="M 68.3 177.0 A 36 36 0 0 1 140.3 177.0 Z" 
          fill="#0C1220" stroke="none"/>
    
    <!-- Sun rays (thin, delicate) -->
    <g stroke-width="1.8">
  <line x1="104.3" y1="173.0" x2="58.0" y2="173.0"/>
  <line x1="104.3" y1="173.0" x2="58.0" y2="160.6"/>
  <line x1="104.3" y1="173.0" x2="58.0" y2="146.3"/>
  <line x1="104.3" y1="173.0" x2="63.3" y2="132.0"/>
  <line x1="104.3" y1="173.0" x2="75.3" y2="122.8"/>
  <line x1="104.3" y1="173.0" x2="89.3" y2="117.0"/>
  <line x1="104.3" y1="173.0" x2="104.3" y2="115.0"/>
  <line x1="104.3" y1="173.0" x2="119.3" y2="117.0"/>
  <line x1="104.3" y1="173.0" x2="133.3" y2="122.8"/>
  <line x1="104.3" y1="173.0" x2="145.3" y2="132.0"/>
  <line x1="104.3" y1="173.0" x2="154.5" y2="144.0"/>
  <line x1="104.3" y1="173.0" x2="160.3" y2="158.0"/>
  <line x1="104.3" y1="173.0" x2="162.3" y2="173.0"/>
    </g>
    
  </g>
</svg>
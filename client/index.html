<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!--
      Theme + reading-size flash prevention. Runs synchronously before
      paint so the page renders in the user's persisted theme and font
      scale rather than flashing the dark default at light-mode visitors
      or shrinking from comfortable to default. Mirrors the logic in
      client/src/lib/theme.tsx.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("thedesk:theme");
          var mode = stored === "light" || stored === "dark" || stored === "system" ? stored : "dark";
          var resolved =
            mode === "system"
              ? window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"
              : mode;
          if (resolved === "light") document.documentElement.classList.add("light");
          document.documentElement.style.colorScheme = resolved;

          var size = localStorage.getItem("thedesk:reading-size");
          if (size === "comfortable") document.documentElement.classList.add("comfortable");
        } catch (e) {}
      })();
    </script>
    <title>The Desk — Daily intelligence for property partnerships</title>
    <meta
      name="description"
      content="60-second morning scan, weekly deep-dive editions, and ready-to-use talking points. Built for partners who walk into client conversations sounding sharper than the headlines."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Desk — Daily intelligence for property partnerships" />
    <meta
      property="og:description"
      content="60-second morning scan, weekly deep-dive editions, and ready-to-use talking points."
    />
    <meta property="og:image" content="/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-card.png" />

    <link rel="alternate" type="application/rss+xml" title="The Desk RSS" href="/feed.xml" />

    <!--
      Analytics is now self-hosted. The React app fires a beacon to
      /api/analytics/pageview on every route change (see
      client/src/lib/analytics.ts). No third-party script, no
      cookies, no fingerprinting, no off-prem data.
    -->

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "The Desk",
        "description": "Daily intelligence for property partnerships, curated by Ruben Laubscher.",
        "publisher": {
          "@type": "Organization",
          "name": "The Desk",
          "founder": {
            "@type": "Person",
            "name": "Ruben Laubscher",
            "jobTitle": "Head of Partnerships, InvestorKit",
            "sameAs": [
              "https://www.linkedin.com/in/ruben-laubscher/",
              "https://rubenlaubscher.substack.com/"
            ]
          }
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://thedesk.au/archive?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0c1220" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="The Desk" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!--
      First-paint splash. Renders synchronously from inline HTML/CSS so
      the brand surface appears before the JS bundle parses and React
      hydrates. Removed by main.tsx once the React tree has committed.
      The mark geometry mirrors client/public/brand/desk-favicon.svg —
      the brand-approved simplified 7-ray variant for legibility.
    -->
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #0c1220;
        color: #d4a853;
        transition: opacity 420ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      html.light #boot-splash {
        background: #f5f0e8;
        color: #1a1a1a;
      }
      #boot-splash.done {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash svg {
        display: block;
        animation: boot-mark-in 700ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      #boot-splash .boot-wordmark {
        font-family: "Playfair Display", Georgia, "Times New Roman", serif;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: -0.02em;
        line-height: 1;
        margin: 0;
        background: linear-gradient(135deg, #f7e6b4 0%, #e8c46c 55%, #b88a3a 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: boot-mark-in 700ms cubic-bezier(0.16, 1, 0.3, 1) 120ms both;
      }
      #boot-splash .boot-byline {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 9px;
        letter-spacing: 0.24em;
        color: rgba(255, 255, 255, 0.45);
        margin: 0;
        text-transform: uppercase;
        animation: boot-mark-in 700ms cubic-bezier(0.16, 1, 0.3, 1) 240ms both;
      }
      html.light #boot-splash .boot-byline {
        color: rgba(0, 0, 0, 0.4);
      }
      @keyframes boot-mark-in {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash svg,
        #boot-splash .boot-wordmark,
        #boot-splash .boot-byline { animation: none; }
        #boot-splash { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <svg width="60" height="70" viewBox="0 0 240 280">
        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <g stroke-width="7">
            <line x1="56" y1="16" x2="56" y2="264" />
            <line x1="56" y1="100" x2="92" y2="100" />
            <line x1="56" y1="264" x2="92" y2="264" />
            <path d="M 92 100 A 82 82 0 0 1 92 264" />
          </g>
          <path d="M 68.3 177 A 36 36 0 0 1 140.3 177 Z" fill="currentColor" stroke="none" />
          <g stroke-width="3">
            <line x1="104.3" y1="173" x2="58" y2="173" />
            <line x1="104.3" y1="173" x2="61.6" y2="148.3" />
            <line x1="104.3" y1="173" x2="79.7" y2="130.3" />
            <line x1="104.3" y1="173" x2="104.3" y2="123.7" />
            <line x1="104.3" y1="173" x2="128.9" y2="130.3" />
            <line x1="104.3" y1="173" x2="147" y2="148.3" />
            <line x1="104.3" y1="173" x2="153.6" y2="173" />
          </g>
        </g>
      </svg>
      <p class="boot-wordmark">The Desk</p>
      <p class="boot-byline">Intelligence</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

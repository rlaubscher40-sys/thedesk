    <!--
      Plausible analytics — cookieless, privacy-friendly, EU-friendly.
      Loaded only when VITE_PLAUSIBLE_DOMAIN is set (e.g. "thedesk.com.au").
      Sign up at plausible.io, add the domain, then set the env var on
      Railway and redeploy. No GDPR cookie banner needed.
    -->
    <script>
      (function () {
        var domain = "%VITE_PLAUSIBLE_DOMAIN%";
        if (!domain || domain.indexOf("VITE_PLAUSIBLE_DOMAIN") !== -1) return;
        var s = document.createElement("script");
        s.defer = true;
        s.setAttribute("data-domain", domain);
        s.src = "https://plausible.io/js/script.js";
        document.head.appendChild(s);
      })();
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "The Desk",
        "description": "Daily intelligence for property partnerships, curated by Ruben Laubscher.",
        "publisher": {
          "@type": "Organization",
          "name": "The Desk",
          "founder": {
            "@type": "Person",
            "name": "Ruben Laubscher",
            "jobTitle": "Head of Partnerships, InvestorKit",
            "sameAs": [
              "https://www.linkedin.com/in/ruben-laubscher/",
              "https://rubenlaubscher.substack.com/"
            ]
          }
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

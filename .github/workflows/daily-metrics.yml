name: Daily metrics ingest

on:
  schedule:
    # 20:33 UTC = 06:33 Sydney AEST (shifts to 07:33 during summer AEDT).
    # Runs first so the metrics strip is fresh on the Instagram cover; the
    # daily brief itself doesn't read metrics, so order isn't load-bearing.
    # The minute is offset off :00/:30 to dodge GitHub's busiest cron slots,
    # which were delaying these runs by ~2h.
    # NB: scheduled runs only fire from the workflow file on the default
    # branch (main). GitHub's cron is best-effort and may still slip.
    - cron: "33 20 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual test"

concurrency:
  group: daily-metrics
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run daily metrics ingest
        env:
          INGEST_BASE_URL: ${{ secrets.INGEST_BASE_URL }}
          SCHEDULED_API_KEY: ${{ secrets.SCHEDULED_API_KEY }}
        run: pnpm ingest:metrics

name: Weekly edition synthesis

on:
  schedule:
    # 21:17 UTC Saturday = 07:17 Sunday Sydney AEST / 08:17 (AEDT).
    # Posts before the week starts so Sunday morning has the new edition.
    # The minute is offset off :00 to dodge GitHub's busiest cron slot, which
    # was delaying these runs.
    - cron: "17 21 * * 6"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual test"

concurrency:
  group: weekly-edition
  cancel-in-progress: false

jobs:
  synthesize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Trigger weekly edition synthesis
        env:
          INGEST_BASE_URL: ${{ secrets.INGEST_BASE_URL }}
          SCHEDULED_API_KEY: ${{ secrets.SCHEDULED_API_KEY }}
        run: pnpm ingest:weekly

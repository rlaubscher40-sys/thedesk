name: Instagram daily post

on:
  schedule:
    # 21:47 UTC daily = 07:47 Sydney AEST (shifts to 08:47 during summer AEDT).
    # Runs after the daily feed ingest so LLM enrichment (whyItMatters) has
    # time to complete. The minute is offset off :00/:30 to dodge GitHub's
    # busiest cron slots, which were delaying these runs by ~2h.
    # NB: scheduled runs only fire from the workflow file on the default
    # branch (main). GitHub's cron is best-effort and may still slip.
    - cron: "47 21 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual test"

concurrency:
  group: instagram-daily
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Instagram daily post
        env:
          INGEST_BASE_URL: ${{ secrets.INGEST_BASE_URL }}
          SCHEDULED_API_KEY: ${{ secrets.SCHEDULED_API_KEY }}
        run: |
          BASE="${INGEST_BASE_URL%/}"
          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-scheduled-key: ${SCHEDULED_API_KEY}" \
            "${BASE}/api/ingest/instagram-daily" \
            -d '{}'

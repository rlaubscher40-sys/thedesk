name: Instagram daily post

on:
  schedule:
    # 21:13 UTC daily = 07:13 Sydney AEST (shifts to 08:13 during summer AEDT).
    # Runs ~30 min after the daily feed ingest so the feed's background
    # enrichment (whyItMatters/sayThis) has usually finished and the post can
    # reuse it; if it hasn't, ensureSlideContent() generates the missing lines
    # at post time, so this gap is a nicety, not a hard dependency.
    # The minute is offset off :00/:30 to dodge GitHub's busiest cron slots.
    # NB: scheduled runs only fire from the workflow file on the default
    # branch (main). GitHub's cron is best-effort and may still slip.
    - cron: "13 21 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual test"

concurrency:
  group: instagram-daily
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Instagram daily post
        env:
          INGEST_BASE_URL: ${{ secrets.INGEST_BASE_URL }}
          SCHEDULED_API_KEY: ${{ secrets.SCHEDULED_API_KEY }}
        run: |
          BASE="${INGEST_BASE_URL%/}"
          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-scheduled-key: ${SCHEDULED_API_KEY}" \
            "${BASE}/api/ingest/instagram-daily" \
            -d '{}'

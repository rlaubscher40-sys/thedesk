name: Instagram insights refresh

# Least privilege: pure curl job, no GITHUB_TOKEN access needed.
permissions: {}

on:
  # Timing is driven by the in-process scheduler (server/scheduler), reliable
  # where GitHub cron ran late / dropped runs — see docs/reliable-scheduling.md.
  # workflow_dispatch stays so the job can still be triggered by hand.
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual test"

concurrency:
  group: instagram-insights
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Instagram insights refresh
        env:
          INGEST_BASE_URL: ${{ secrets.INGEST_BASE_URL }}
          SCHEDULED_API_KEY: ${{ secrets.SCHEDULED_API_KEY }}
        run: |
          BASE="${INGEST_BASE_URL%/}"
          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-scheduled-key: ${SCHEDULED_API_KEY}" \
            "${BASE}/api/ingest/instagram-insights" \
            -d '{}'

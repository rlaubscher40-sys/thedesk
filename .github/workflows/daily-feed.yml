name: Daily feed ingest

on:
  schedule:
    # 20:33 UTC daily = 06:33 Sydney AEST — the morning brief, just before 7am.
    # Anchored to AEST, so it shifts to 07:33 during summer (AEDT).
    # The minute is offset off the :00/:30 boundary on purpose: GitHub's shared
    # cron is most congested — and most delayed — at the top and half of the
    # hour, which was pushing these runs ~2h late.
    # NB: scheduled runs only fire from the workflow file on the default
    # branch (main). GitHub's cron is best-effort and may still slip.
    - cron: "33 20 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual test"

concurrency:
  group: daily-feed
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # 8 minutes was tripping right as the script finished — Node was
    # holding open sockets from og:image fetches that prevented a clean
    # exit. The script now calls process.exit() explicitly, and we
    # raise the ceiling to 15m for headroom on slow news days.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run daily feed ingest
        env:
          INGEST_BASE_URL: ${{ secrets.INGEST_BASE_URL }}
          SCHEDULED_API_KEY: ${{ secrets.SCHEDULED_API_KEY }}
        run: pnpm ingest:daily

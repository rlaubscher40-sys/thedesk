name: Daily feed ingest

# Least privilege: the job only needs to read the repo for checkout.
permissions:
  contents: read

on:
  # Timing is driven by the in-process scheduler (server/scheduler), reliable
  # where GitHub cron ran late / dropped runs — see docs/reliable-scheduling.md.
  # workflow_dispatch stays so the job can still be triggered by hand.
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual test"

concurrency:
  group: daily-feed
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # 8 minutes was tripping right as the script finished — Node was
    # holding open sockets from og:image fetches that prevented a clean
    # exit. The script now calls process.exit() explicitly. Raised again to
    # 20m once the per-channel feed (~46 picked items vs the old ~20) roughly
    # doubled the og:image/article fetch stage's work on a busy day.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run daily feed ingest
        env:
          INGEST_BASE_URL: ${{ secrets.INGEST_BASE_URL }}
          SCHEDULED_API_KEY: ${{ secrets.SCHEDULED_API_KEY }}
        run: pnpm ingest:daily

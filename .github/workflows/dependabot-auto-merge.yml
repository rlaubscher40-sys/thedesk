name: Dependabot auto-merge

# Auto-merge the low-risk Dependabot PRs so they stop piling up, while still
# routing anything that could break the app to a human:
#   · npm patch + minor bumps  → auto-merge
#   · GitHub Actions bumps      → auto-merge (version-pin refreshes)
#   · npm MAJOR bumps           → left open for manual review
#
# Auto-merge is *enabled*, not forced: GitHub still holds the PR until the
# required "test" check passes, so a bump that breaks CI never lands. For that
# gate to work the repo needs (one-time, in Settings):
#   1. General → Pull Requests → "Allow auto-merge"  ✓
#   2. Branches → protect `main` → require the "test" status check
# Without the branch rule, auto-merge would merge before CI finishes.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only act on Dependabot's own PRs.
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Enable auto-merge for safe updates
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.package-ecosystem == 'github_actions'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
